name: CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (low/med)
        run: |
          npm audit --audit-level=moderate || true

  build-and-test:
    needs: security-audit
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: http://localhost:3000
      # Automatically enable Docker services when running on github.com (real Actions).
      # Keep disabled by default for local Act runs to avoid requiring docker socket.
      RUN_DOCKER_SERVICES: ${{ github.server_url == 'https://github.com' && 'true' || 'false' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Validate DATABASE_URL secret is present
        run: |
          # DATABASE_URL is kept as-is (e.g. Neon) for runner-side use.
          # The compose-internal URL (using host `db`) is written to secrets/database_url.txt
          # later in the "Prepare secret files" step.
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "ERROR: DATABASE_URL secret is required" >&2
            exit 1
          fi
          echo "Credentials present — OK"
      - name: Check DATABASE_URL present and valid
        if: ${{ env.RUN_DOCKER_SERVICES == 'true' || env.DATABASE_URL != '' }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "ERROR: DATABASE_URL is not set in runner environment. Add it as a repository secret (Settings → Secrets → Actions)." >&2
            exit 1
          fi
          case "${DATABASE_URL}" in
            postgresql://*|postgres://*) echo "DATABASE_URL format OK" ;;
            *) echo "ERROR: DATABASE_URL must start with 'postgresql://' or 'postgres://'" >&2 ; exit 1 ;;
          esac
      - name: Run smoke tests
        run: |
          echo "Running smoke tests (non-invasive)"
          node ./scripts/test/smoke.js
        shell: bash
      - name: Prepare secret files for docker-compose
        if: ${{ env.RUN_DOCKER_SERVICES == 'true' }}
        run: |
          echo "Preparing ./secrets files for docker-compose"
          mkdir -p ./secrets

          # Write the compose-internal DATABASE_URL (host = `db` service name).
          # This is separate from the runner-side DATABASE_URL which may point to Neon.
          if [ -n "${POSTGRES_USER:-}" ] && [ -n "${POSTGRES_PASSWORD:-}" ] && [ -n "${POSTGRES_DB:-}" ]; then
            printf 'postgresql://%s:%s@db:5432/%s' "${POSTGRES_USER}" "${POSTGRES_PASSWORD}" "${POSTGRES_DB}" > ./secrets/database_url.txt
            echo "Wrote compose-internal database_url.txt (host=db)"
          elif [ -n "${DATABASE_URL:-}" ]; then
            printf '%s' "${DATABASE_URL}" > ./secrets/database_url.txt
            echo "Wrote database_url.txt from DATABASE_URL secret"
          else
            echo "ERROR: No credentials to write database_url.txt" >&2
            exit 1
          fi

          # Write individual postgres secrets (used by docker-compose db service).
          # Fall back to values parsed from DATABASE_URL if explicit secrets absent.
          if [ -n "${POSTGRES_USER:-}" ]; then
            printf '%s' "${POSTGRES_USER}" > ./secrets/postgres_user.txt
          else
            printf '%s' "$(echo "${DATABASE_URL}" | sed 's|.*://\([^:]*\):.*|\1|')" > ./secrets/postgres_user.txt
          fi

          if [ -n "${POSTGRES_PASSWORD:-}" ]; then
            printf '%s' "${POSTGRES_PASSWORD}" > ./secrets/postgres_password.txt
          else
            printf '%s' "$(echo "${DATABASE_URL}" | sed 's|.*://[^:]*:\([^@]*\)@.*|\1|')" > ./secrets/postgres_password.txt
          fi

          if [ -n "${POSTGRES_DB:-}" ]; then
            printf '%s' "${POSTGRES_DB}" > ./secrets/postgres_db.txt
          else
            printf '%s' "$(echo "${DATABASE_URL}" | sed 's|.*/\([^?]*\).*|\1|')" > ./secrets/postgres_db.txt
          fi

          # NextAuth secret — required for the app to start.
          if [ -n "${NEXTAUTH_SECRET:-}" ]; then
            printf '%s' "${NEXTAUTH_SECRET}" > ./secrets/nextauth_secret.txt
          else
            # Generate a random secret so the app starts; sessions won't persist
            # across runs but the build/smoke will succeed.
            openssl rand -base64 32 > ./secrets/nextauth_secret.txt
            echo "WARNING: NEXTAUTH_SECRET not set — generated a temporary secret for this CI run"
          fi

          echo "Secret files written:"
          ls -la ./secrets/
      - name: Build containers
        if: ${{ env.RUN_DOCKER_SERVICES == 'true' }}
        run: docker compose build
      - name: Start services
        if: ${{ env.RUN_DOCKER_SERVICES == 'true' }}
        run: docker compose up -d
      - name: Wait for database readiness
        if: ${{ env.RUN_DOCKER_SERVICES == 'true' }}
        run: |
          echo "Waiting for db service to pass its healthcheck (up to 2 minutes)..."
          db_container=$(docker compose ps -q db 2>/dev/null)
          if [ -z "$db_container" ]; then
            echo "ERROR: could not find db container" >&2
            docker compose ps
            exit 1
          fi
          echo "db container ID: $db_container"
          success=0
          for i in $(seq 1 60); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$db_container" 2>/dev/null || echo "missing")
            echo "Attempt $i: db health = $status"
            if [ "$status" = "healthy" ]; then
              success=1
              echo "DB is healthy"
              break
            fi
            sleep 2
          done
          if [ "$success" -ne 1 ]; then
            echo "Timed out waiting for database to become ready" >&2
            docker compose logs db --tail=30
            exit 1
          fi
      - name: Apply migrations (full smoke)
        if: ${{ env.RUN_DOCKER_SERVICES == 'true' }}
        run: |
          # Pass the compose-internal DATABASE_URL (host=db) from the secrets file
          # into the exec session so smoke.js can see it as an env var.
          COMPOSE_DB_URL="$(cat ./secrets/database_url.txt)"
          echo "Running migrations inside app container..."
          docker compose exec -T -e DATABASE_URL="${COMPOSE_DB_URL}" app node scripts/test/smoke.js --full
      - name: Tear down
        if: ${{ always() && env.RUN_DOCKER_SERVICES == 'true' }}
        run: docker compose down -v

 
  setup-ec2-docker:
    name: Setup EC2 Docker & Start App
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Prepare Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          request_pty: true
          script: |
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            echo "[prepare] stopping unattended-upgrades to free apt lock..."
            sudo systemctl stop unattended-upgrades || true
            echo "[prepare] waiting for dpkg lock to clear..."
            for i in {1..24}; do
              if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then
                echo "  dpkg lock busy, waiting 5s... ($i/24)"
                sleep 5
              else
                break
              fi
            done
            echo "[prepare] server ready $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Install Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          request_pty: true
          script: |
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            if ! command -v docker &>/dev/null; then
              echo "[docker-install] docker not found — installing..."
              timeout 180 sudo apt-get update -y
              timeout 300 sudo apt-get install -y docker.io docker-compose-v2
              echo "[docker-install] installed $(docker --version)"
            else
              echo "[docker-install] docker already present — $(docker --version)"
            fi
            if ! sudo docker compose version &>/dev/null; then
              echo "[docker-install] installing compose plugin..."
              timeout 180 sudo apt-get update -y
              timeout 180 sudo apt-get install -y docker-compose-plugin
            fi
            echo "[docker-install] compose: $(sudo docker compose version)"

      - name: Start Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          request_pty: true
          script: |
            set -euxo pipefail
            echo "[docker-start] enabling and starting Docker daemon..."
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo systemctl is-active docker
            echo "[docker-start] done $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Fix Docker Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 2m
          request_pty: true
          script: |
            set -euxo pipefail
            CURRENT_USER="$(whoami)"
            echo "[permissions] adding $CURRENT_USER to docker group..."
            sudo usermod -aG docker "$CURRENT_USER" || true
            echo "[permissions] done — new SSH sessions will use group directly"

      - name: Verify Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          request_pty: true
          script: |
            set -euxo pipefail
            echo "[verify] running hello-world to confirm Docker is functional..."
            sudo docker run --rm hello-world
            echo "[verify] Docker is working correctly $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Deploy App Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 20m
          request_pty: true
          script: |
            set -euxo pipefail
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            PROJECT_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            PROJECT_DIR="${PROJECT_DIR:-/home/$(whoami)/app}"
            echo "[deploy-container] project dir=$PROJECT_DIR"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "[deploy-container] WARNING: project dir not found — skipping compose"
              exit 0
            fi
            cd "$PROJECT_DIR"
            sudo docker compose pull || true
            if ! sudo docker compose up -d --build; then
              echo "[deploy-container] compose up failed — dumping logs:"
              sudo docker compose ps || true
              sudo docker compose logs --no-color --tail=200 || true
              exit 1
            fi
            echo "[deploy-container] done $(date -u +%Y-%m-%dT%H:%M:%SZ)"
