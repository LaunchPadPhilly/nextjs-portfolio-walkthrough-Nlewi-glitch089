name: Deploy to EC2 via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rsync (optional)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Add SSH key and known hosts
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH (pull & build on host)
        env:
          EC2_USER: ${{ secrets.EC2_SSH_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_DIR: ${{ secrets.EC2_REMOTE_DIR }}
        run: |
          # If REMOTE_DIR is not set, default to the user's home 'app' folder
          REMOTE_DIR=${REMOTE_DIR:-/home/$EC2_USER/app}

          ssh -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" "REMOTE_DIR='$REMOTE_DIR' bash -lc '
            set -e
            cd "\$REMOTE_DIR" || { mkdir -p "\$REMOTE_DIR" && cd "\$REMOTE_DIR"; }
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            else
              git clone --depth=1 https://github.com/${{ github.repository }} "\$REMOTE_DIR"
            fi
            npm ci --production
            npm run build
            # Restart process manager — adapt to your service manager
            pm2 restart all || sudo systemctl restart my-app.service || true
          '"
