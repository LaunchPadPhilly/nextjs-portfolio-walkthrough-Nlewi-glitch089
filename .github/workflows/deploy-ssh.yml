name: Deploy to EC2 via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rsync (optional)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Add SSH key and known hosts
        if: ${{ secrets.EC2_USER != '' && secrets.EC2_HOST != '' && secrets.EC2_KEY != '' }}
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$EC2_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || echo "Warning: ssh-keyscan failed; continuing"

      - name: Deploy via SSH (pull & build on host)
        if: ${{ secrets.EC2_USER != '' && secrets.EC2_HOST != '' && secrets.EC2_KEY != '' }}
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_DIR: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          REMOTE_DIR=${REMOTE_DIR:-/home/$EC2_USER/app}

          ssh -o StrictHostKeyChecking=accept-new "$EC2_USER@$EC2_HOST" REMOTE_DIR="$REMOTE_DIR" REPO="${{ github.repository }}" bash -s << 'ENDSSH'
          set -euo pipefail
          REMOTE_DIR=${REMOTE_DIR:-/home/ubuntu/app}
          mkdir -p "$REMOTE_DIR"
          cd "$REMOTE_DIR"
          if [ -d .git ]; then
            git fetch --all --prune
            git reset --hard origin/main
          else
            git init
            if git remote get-url origin >/dev/null 2>&1; then
              git remote set-url origin "https://github.com/$REPO"
            else
              git remote add origin "https://github.com/$REPO"
            fi
            git fetch --depth=1 origin main
            git reset --hard FETCH_HEAD
          fi
          if ! command -v npm >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          npm ci --production
          npm run build
          pm2 restart all || sudo systemctl restart my-app.service || true
          ENDSSH
