name: Deploy to EC2 via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check Prerequisites
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          request_pty: true
          script: |
            set -euxo pipefail
            echo "[prereq] checking required tools..."
            command -v git    && echo "  git: OK"
            command -v docker && echo "  docker: OK"
            docker compose version && echo "  docker compose: OK"
            # npm/pm2 are checked as warnings — they will be auto-installed if missing
            command -v npm &>/dev/null && echo "  npm: OK" || echo "  npm: NOT FOUND (will install in build step)"
            command -v pm2 &>/dev/null && echo "  pm2: OK" || echo "  pm2: NOT FOUND (will install in build step)"
            echo "[prereq] all checks passed $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Sync Repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          request_pty: true
          script: |
            set -euxo pipefail
            REMOTE_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            REMOTE_DIR="${REMOTE_DIR:-/home/$(whoami)/app}"
            REPO="${{ github.repository }}"
            echo "[sync] target dir=$REMOTE_DIR"
            mkdir -p "$REMOTE_DIR"
            cd "$REMOTE_DIR"
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            else
              git init
              if git remote get-url origin &>/dev/null; then
                git remote set-url origin "https://github.com/$REPO"
              else
                git remote add origin "https://github.com/$REPO"
              fi
              git fetch --depth=1 origin main
              git reset --hard FETCH_HEAD
            fi
            echo "[sync] done — HEAD=$(git rev-parse --short HEAD)"

      - name: Install Dependencies & Build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 20m
          request_pty: true
          script: |
            set -euxo pipefail
            REMOTE_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            REMOTE_DIR="${REMOTE_DIR:-/home/$(whoami)/app}"
            cd "$REMOTE_DIR"
            # Ensure Node.js + npm are present (self-healing for new/rebuilt instances)
            if ! command -v npm >/dev/null 2>&1; then
              echo "[build] npm not found — installing Node.js 20..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            node -v
            npm -v
            # Ensure pm2 is present
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "[build] pm2 not found — installing globally..."
              sudo npm install -g pm2
            fi
            echo "[build] installing dependencies..."
            npm ci --no-audit --no-fund
            echo "[build] building Next.js app..."
            npm run build
            echo "[build] done $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          request_pty: true
          script: |
            set -euxo pipefail
            REMOTE_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            REMOTE_DIR="${REMOTE_DIR:-/home/$(whoami)/app}"
            cd "$REMOTE_DIR"
            echo "[restart] starting/restarting PM2 process..."
            pm2 restart portfolio 2>/dev/null \
              || pm2 start npm --name "portfolio" -- start
            pm2 save
            echo "[restart] done $(date -u +%Y-%m-%dT%H:%M:%SZ)"
