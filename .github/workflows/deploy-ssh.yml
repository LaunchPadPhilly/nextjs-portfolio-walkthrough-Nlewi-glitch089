name: Deploy to EC2 via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 45m
          request_pty: true
          script: |
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            REMOTE_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            REMOTE_DIR="${REMOTE_DIR:-/home/$(whoami)/app}"
            REPO="${{ github.repository }}"
            CURRENT_USER="$(whoami)"
            echo "[deploy] start $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[deploy] target user=$CURRENT_USER dir=$REMOTE_DIR"

            echo "[deploy] step 1/6: docker check"
            if ! command -v docker &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-v2
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker "$CURRENT_USER"
            fi
            if ! docker compose version &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin || true
            fi

            echo "[deploy] step 2/6: node/npm check"
            if ! command -v npm &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            echo "[deploy] step 3/6: pm2 check"
            if ! command -v pm2 &>/dev/null; then
              sudo npm install -g pm2
              sudo env PATH="$PATH" pm2 startup systemd -u "$CURRENT_USER" --hp "$HOME" || true
            fi

            echo "[deploy] step 4/6: sync repository"
            mkdir -p "$REMOTE_DIR"
            cd "$REMOTE_DIR"
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            else
              git init
              if git remote get-url origin &>/dev/null; then
                git remote set-url origin "https://github.com/$REPO"
              else
                git remote add origin "https://github.com/$REPO"
              fi
              git fetch --depth=1 origin main
              git reset --hard FETCH_HEAD
            fi

            echo "[deploy] step 5/6: install and build"
            npm ci --no-audit --no-fund
            npm run build

            echo "[deploy] step 6/6: restart app"
            pm2 restart portfolio 2>/dev/null \
              || pm2 start npm --name "portfolio" -- start
            pm2 save
            echo "[deploy] done $(date -u +%Y-%m-%dT%H:%M:%SZ)"
