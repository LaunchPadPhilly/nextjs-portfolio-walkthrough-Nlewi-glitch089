name: Deploy to EC2 via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rsync (optional)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Add SSH key and known hosts
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          if [ -z "$EC2_USER" ] || [ -z "$EC2_HOST" ] || [ -z "$EC2_KEY" ]; then
            echo "EC2 deploy secrets missing (EC2_USER, EC2_HOST, or EC2_KEY). Skipping deploy workflow."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH (pull & build on host)
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_DIR: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          if [ -z "$EC2_USER" ] || [ -z "$EC2_HOST" ]; then
            echo "EC2_USER or EC2_HOST secret is not set. Skipping deploy."
            exit 0
          fi
          # If REMOTE_DIR is not set, default to the user's home 'app' folder
          REMOTE_DIR=${REMOTE_DIR:-/home/$EC2_USER/app}

          ssh -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" REMOTE_DIR="$REMOTE_DIR" REPO="${{ github.repository }}" bash -s << 'ENDSSH'
          set -euo pipefail
          REMOTE_DIR=${REMOTE_DIR:-/home/ubuntu/app}
          mkdir -p "$REMOTE_DIR"
          cd "$REMOTE_DIR"
          if [ -d .git ]; then
            git fetch --all --prune
            git reset --hard origin/main
          else
            git clone --depth=1 "https://github.com/$REPO" "$REMOTE_DIR"
          fi
          npm ci --production
          npm run build
          pm2 restart all || sudo systemctl restart my-app.service || true
          ENDSSH
